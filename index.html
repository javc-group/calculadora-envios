<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Envíos | javc-group</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .container { 
            background: #1e293b; 
            width: 100%; 
            max-width: 480px; 
            border-radius: 24px; 
            padding: 30px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); 
            position: relative; 
        }
        
        /* Barra de identidad visual elegante con los colores de Venezuela */
        .venezuela-bar { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 5px; 
            display: flex; 
            border-radius: 24px 24px 0 0; 
            overflow: hidden; 
        }
        .v-am { flex: 1; background: #eab308; } 
        .v-az { flex: 1; background: #2563eb; } 
        .v-rj { flex: 1; background: #dc2626; }

        .brand { 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 25px; 
        }
        .brand h2 { 
            font-size: 1.3rem; 
            letter-spacing: 2px; 
            color: #94a3b8; 
            text-transform: uppercase; 
        }
        .brand span { 
            color: #f8fafc; 
            font-weight: bold; 
        }

        /* Pantalla de carga inicial */
        .loading-overlay { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin: 40px 0; 
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border-left-color: #eab308; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .hidden { display: none !important; }
        
        .input-group { 
            background: #0f172a; 
            border: 2px solid #334155; 
            border-radius: 16px; 
            padding: 14px 16px; 
            margin-bottom: 18px; 
            transition: border-color 0.2s; 
        }
        .input-group:focus-within { 
            border-color: #2563eb; 
        }
        .input-label { 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-bottom: 6px; 
            display: block; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .input-row { 
            display: flex; 
            align-items: center; 
        }
        .input-row input { 
            background: transparent; 
            border: none; 
            color: #f8fafc; 
            font-size: 1.6rem; 
            width: 100%; 
            outline: none; 
            font-weight: bold; 
        }
        .currency-badge { 
            font-weight: bold; 
            color: #94a3b8; 
            font-size: 1.1rem; 
            padding-left: 10px; 
        }

        .breakdown { 
            background: #0f172a; 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 20px; 
            font-size: 0.9rem; 
            border-left: 4px solid #2563eb; 
        }
        .breakdown-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            color: #94a3b8; 
        }
        .breakdown-row:last-child {
            margin-bottom: 0;
        }
        .breakdown-row.total { 
            margin-top: 12px; 
            padding-top: 12px; 
            border-top: 1px dashed #334155; 
            color: #f8fafc; 
            font-weight: bold; 
            font-size: 1.05rem; 
        }
        .breakdown-row span.highlight { 
            color: #eab308; 
        }

        .toggle-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #0f172a; 
            padding: 14px 16px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            border: 1px solid #334155; 
        }
        .toggle-info h4 { 
            font-size: 0.9rem; 
            color: #f8fafc; 
        }
        .toggle-info p { 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-top: 2px;
        }
        
        /* Switch de activación de USDT */
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 46px; 
            height: 26px; 
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #334155; 
            transition: .3s; 
            border-radius: 24px; 
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 18px; 
            width: 18px; 
            left: 4px; 
            bottom: 4px; 
            background-color: white; 
            transition: .3s; 
            border-radius: 50%; 
        }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-action { 
            background: #2563eb; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.05rem; 
            transition: background 0.2s, transform 0.1s; 
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .btn-action:hover { 
            background: #1d4ed8; 
        }
        .btn-action:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="venezuela-bar">
        <div class="v-am"></div>
        <div class="v-az"></div>
        <div class="v-rj"></div>
    </div>
    
    <div class="brand">
        <h2><span>javc</span>-group</h2>
    </div>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 16px; color: #64748b; font-size: 0.9rem;">Sincronizando tasas en tiempo real...</p>
    </div>

    <div id="calculator-content" class="hidden">
        <div class="input-group">
            <label class="input-label">TÚ ENVIAS DESDE EUROPA</label>
            <div class="input-row">
                <input type="text" id="eur-input" placeholder="0.00" inputmode="decimal">
                <span class="currency-badge" id="pay-currency-label">EUR</span>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">RECIBEN EN VENEZUELA (PAGO MÓVIL)</label>
            <div class="input-row">
                <input type="text" id="ves-input" placeholder="0.00" inputmode="decimal">
                <span class="currency-badge">VES</span>
            </div>
        </div>

        <div class="toggle-container">
            <div class="toggle-info">
                <h4>¿Prefieres pagar con USDT?</h4>
                <p id="usdt-rate-text">Aplicando conversión preferencial</p>
            </div>
            <label class="switch">
                <input type="checkbox" id="usdt-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="breakdown">
            <div class="breakdown-row">
                <span>Tasa de cambio del día:</span>
                <span id="rate-display" style="font-weight: 600; color: #f8fafc;">0.00 VES</span>
            </div>
            <div class="breakdown-row">
                <span>Comisión de gestión:</span>
                <span id="fee-display">0.00 EUR</span>
            </div>
            <div class="breakdown-row">
                <span>Monto neto a cambiar:</span>
                <span id="net-display">0.00 EUR</span>
            </div>
            <div class="breakdown-row total">
                <span>Total a depositar/transferir:</span>
                <span id="total-payment-display" class="highlight">0.00 EUR</span>
            </div>
        </div>

        <button class="btn-action" id="whatsapp-btn">
            Enviar Pedido por WhatsApp
        </button>
    </div>
</div>

<script>
    // ==========================================
    // REEMPLAZA CON TUS CREDENCIALES DE FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "TU_API_KEY_AQUI",
        authDomain: "remesas-venezuela.firebaseapp.com",
        databaseURL: "https://remesas-venezuela-default-rtdb.firebaseio.com",
        projectId: "remesas-venezuela",
        storageBucket: "remesas-venezuela.appspot.com",
        messagingSenderId: "TU_SENDER_ID_AQUI",
        appId: "TU_APP_ID_AQUI"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Valores por defecto seguros de la app
    let sysConfig = {
        comision_tipo: "porcentaje",
        comision_valor: 0.04,
        tasa_cambio: 0,
        tasa_usdt_euro: 1.03
    };

    // Mapeo de elementos HTML
    const eurInput = document.getElementById('eur-input');
    const vesInput = document.getElementById('ves-input');
    const usdtToggle = document.getElementById('usdt-toggle');
    const payCurrencyLabel = document.getElementById('pay-currency-label');
    const rateDisplay = document.getElementById('rate-display');
    const feeDisplay = document.getElementById('fee-display');
    const netDisplay = document.getElementById('net-display');
    const totalPaymentDisplay = document.getElementById('total-payment-display');
    const usdtRateText = document.getElementById('usdt-rate-text');

    // Escuchar cambios en tiempo real en la raíz de tu Realtime Database (/)
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Extraer valores o usar defaults seguros si no se han guardado aún en el admin
            sysConfig.tasa_cambio = parseFloat(data.tasa_cambio) || 0;
            sysConfig.comision_tipo = data.comision_tipo || "porcentaje";
            sysConfig.comision_valor = data.comision_valor !== undefined ? parseFloat(data.comision_valor) : 0.04;
            sysConfig.tasa_usdt_euro = parseFloat(data.tasa_usdt_euro) || 1.03;

            updateUIParameters();
            
            // Recalcular basado en el input en el que esté parado el usuario
            if (document.activeElement === vesInput) {
                calculateFromVes();
            } else {
                calculateFromEur();
            }
            
            // Ocultar pantalla de carga
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('calculator-content').classList.remove('hidden');
        }
    });

    function updateUIParameters() {
        rateDisplay.innerText = `${sysConfig.tasa_cambio.toFixed(2)} VES`;
        usdtRateText.innerText = `Tasa: ${sysConfig.tasa_usdt_euro.toFixed(2)} USDT por Euro`;
    }

    // Convertir de forma segura inputs con comas o puntos decimales
    function parseInputValue(val) {
        let clean = val.replace(/,/g, '.');
        let num = parseFloat(clean);
        return isNaN(num) || num < 0 ? 0 : num;
    }

    // Eventos de entrada con bloqueo de bucle automático
    eurInput.addEventListener('input', () => {
        if (document.activeElement !== eurInput) return;
        calculateFromEur();
    });

    vesInput.addEventListener('input', () => {
        if (document.activeElement !== vesInput) return;
        calculateFromVes();
    });

    usdtToggle.addEventListener('change', () => {
        payCurrencyLabel.innerText = usdtToggle.checked ? 'USDT' : 'EUR';
        if (document.activeElement === vesInput) {
            calculateFromVes();
        } else {
            calculateFromEur();
        }
    });

    // Lógica 1: El usuario escribe en Euros
    function calculateFromEur() {
        let eurGross = parseInputValue(eurInput.value);
        let tasaVes = sysConfig.tasa_cambio;
        let tipoFee = sysConfig.comision_tipo;
        let valorFee = sysConfig.comision_valor;
        
        let fee = 0;
        if (tipoFee === 'porcentaje') {
            fee = eurGross * valorFee;
        } else {
            fee = eurGross > 0 ? valorFee : 0;
        }

        let eurNet = eurGross - fee;
        if (eurNet < 0) eurNet = 0;
        let vesToReceive = eurNet * tasaVes;

        if (document.activeElement === eurInput || eurInput.value === "") {
            vesInput.value = vesToReceive > 0 ? vesToReceive.toFixed(2) : "";
        }
        renderBreakdown(eurGross, fee, eurNet);
    }
