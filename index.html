<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JAVC Group | Remesas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; } /* Azul oscuro profesional */
        .card-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center">
    
    <main class="w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-white text-3xl font-black">JAVC <span class="text-blue-500">GROUP</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card-glass p-3 rounded-2xl text-center border border-slate-700">
                <p class="text-[9px] text-slate-400 font-bold uppercase">Tasa VES</p>
                <div id="lbl-tasa-ves" class="text-lg font-black text-white">...</div>
            </div>
            <div class="card-glass p-3 rounded-2xl text-center border border-slate-700">
                <p class="text-[9px] text-slate-400 font-bold uppercase">Tasa USDT</p>
                <div id="lbl-tasa-usdt" class="text-lg font-black text-emerald-400">...</div>
            </div>
        </div>

        <div class="card-glass p-6 rounded-3xl border border-slate-700 shadow-2xl space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase">Tú envías (€)</label>
                <input type="number" id="input-eur" placeholder="0.00" class="w-full text-2xl font-black p-3 bg-slate-800 text-white rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase">Destino (VES)</label>
                <input type="number" id="input-ves" placeholder="0.00" class="w-full text-2xl font-black p-3 bg-slate-800 text-white rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="pt-4 border-t border-slate-700 space-y-3">
                <div class="flex justify-between text-xs text-slate-400 font-bold">
                    <span>Comisión aplicada:</span>
                    <span id="txt-comision-info">0.00 EUR</span>
                </div>
                <div class="bg-emerald-900/30 border border-emerald-800 p-4 rounded-2xl text-center">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Neto en USDT</p>
                    <div id="resultado-usdt" class="text-3xl font-black text-emerald-400">$ 0.00</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBvgu33pkvBIQA09XCWOETZRN2n6t-K5nM", authDomain: "remesas-venezuela.firebaseapp.com", databaseURL: "https://remesas-venezuela-default-rtdb.firebaseio.com", projectId: "remesas-venezuela", storageBucket: "remesas-venezuela.firebasestorage.app", messagingSenderId: "629650980768", appId: "1:629650980768:web:f96018986c7a2e87b72ec5" };
        firebase.initializeApp(firebaseConfig);
        
        let config = {};
        const iEur = document.getElementById('input-eur'), iVes = document.getElementById('input-ves');

        firebase.database().ref('/').on('value', (s) => {
            config = s.val() || {};
            document.getElementById('lbl-tasa-ves').innerText = `Bs ${parseFloat(config.tasa_cambio || 0).toFixed(2)}`;
            document.getElementById('lbl-tasa-usdt').innerText = `$ ${parseFloat(config.tasa_usdt || 0).toFixed(4)}`;
        });

        // Cálculo desde Euros
        iEur.oninput = () => {
            let eur = parseFloat(iEur.value) || 0;
            let com = config.comision_tipo === 'fijo' ? config.comision_valor : (config.comision_tipo === 'porcentaje' ? eur * (config.comision_valor/100) : 0);
            
            document.getElementById('txt-comision-info').innerText = `${com.toFixed(2)} EUR`;
            iVes.value = ((eur - com) * config.tasa_cambio).toFixed(2);
            document.getElementById('resultado-usdt').innerText = `$ ${(eur * config.tasa_usdt).toFixed(2)}`;
        };

        // Cálculo desde Bolívares (Bidireccional)
        iVes.oninput = () => {
            let ves = parseFloat(iVes.value) || 0;
            let eurCalculado = ves / config.tasa_cambio;
            
            // Revertir comisión para hallar el monto base en euros
            let eurBase = eurCalculado;
            if (config.comision_tipo === 'fijo') eurBase += config.comision_valor;
            else if (config.comision_tipo === 'porcentaje') eurBase = ves / (config.tasa_cambio * (1 - config.comision_valor/100));

            iEur.value = eurBase.toFixed(2);
            document.getElementById('txt-comision-info').innerText = `${(eurBase - eurCalculado).toFixed(2)} EUR`;
            document.getElementById('resultado-usdt').innerText = `$ ${(eurBase * config.tasa_usdt).toFixed(2)}`;
        };
    </script>
</body>
</html>
