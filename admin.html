<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVC ADMIN | Gestión Definitiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <!-- Login -->
    <div id="login-box" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg">
        <h2 class="text-2xl font-black mb-6 text-center">JAVC ADMIN</h2>
        <input type="text" id="user" placeholder="Usuario" class="w-full p-3 mb-3 border rounded-xl">
        <input type="password" id="pass" placeholder="Contraseña" class="w-full p-3 mb-6 border rounded-xl">
        <button id="btn-login" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Ingresar</button>
    </div>

    <!-- Panel -->
    <div id="admin-panel" class="hidden bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg space-y-4">
        <h1 class="text-xl font-black">Panel de Configuración</h1>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-[10px] font-bold text-slate-500">TASA VES</label>
            <input type="number" id="val-ves" step="0.01" class="w-full p-3 border rounded-xl font-bold"></div>
            <div><label class="text-[10px] font-bold text-slate-500">TASA USDT</label>
            <input type="number" id="val-usdt" step="0.0001" class="w-full p-3 border rounded-xl font-bold"></div>
        </div>
        <select id="sel-tipo" class="w-full p-3 border rounded-xl font-bold">
            <option value="ninguna">Sin Comisión</option>
            <option value="fijo">Comisión Fija</option>
            <option value="porcentaje">Comisión %</option>
        </select>
        <input type="number" id="val-comision" step="0.01" placeholder="Valor comisión" class="w-full p-3 border rounded-xl font-bold">
        <button id="btn-save" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-black">GUARDAR CAMBIOS</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBvgu33pkvBIQA09XCWOETZRN2n6t-K5nM", authDomain: "remesas-venezuela.firebaseapp.com", databaseURL: "https://remesas-venezuela-default-rtdb.firebaseio.com", projectId: "remesas-venezuela", storageBucket: "remesas-venezuela.firebasestorage.app", messagingSenderId: "629650980768", appId: "1:629650980768:web:f96018986c7a2e87b72ec5" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById('btn-login').onclick = () => {
            if(document.getElementById('user').value === "Luciano" && document.getElementById('pass').value === "Andres") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert("Acceso Denegado"); }
        };

        db.ref('/').once('value', (s) => {
            const d = s.val() || {};
            document.getElementById('val-ves').value = d.tasa_cambio || 0;
            document.getElementById('val-usdt').value = d.tasa_usdt || 0;
            document.getElementById('sel-tipo').value = d.comision_tipo || 'ninguna';
            document.getElementById('val-comision').value = d.comision_valor || 0;
        });

        document.getElementById('btn-save').onclick = () => {
            db.ref('/').set({
                tasa_cambio: parseFloat(document.getElementById('val-ves').value),
                tasa_usdt: parseFloat(document.getElementById('val-usdt').value),
                comision_tipo: document.getElementById('sel-tipo').value,
                comision_valor: parseFloat(document.getElementById('val-comision').value)
            }).then(() => alert("Datos guardados"));
        };
    </script>
</body>
</html>
