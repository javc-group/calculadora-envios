<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remesa Rápida Venezuela | Calculadora en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --azul-marino: #003366;
            --oro: #FDB913;
            --gris-fondo: #f8fafc;
            --gris-texto: #475569;
            --blanco: #ffffff;
            --verde-wa: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background-color: var(--gris-fondo); color: var(--gris-texto); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card-calculadora { width: 100%; max-width: 450px; background: var(--blanco); border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 33, 102, 0.08); overflow: hidden; border: 1px solid #e2e8f0; }
        .header-remesa { background: linear-gradient(135deg, var(--azul-marino) 0%, #001f4d 100%); color: var(--blanco); padding: 30px 20px; text-align: center; position: relative; }
        .header-remesa::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #7B1FA2, var(--oro), #D32F2F); }
        .header-remesa h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
        .header-remesa h1 span { color: var(--oro); }
        .header-remesa p { font-size: 14px; color: #cbd5e1; margin-top: 5px; }
        
        .cuerpo-calculadora { padding: 24px; }
        .tasa-info { background: #f0f7ff; border-left: 4px solid var(--azul-marino); padding: 12px; border-radius: 8px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: var(--azul-marino); }
        
        .grupo-input { margin-bottom: 20px; }
        .grupo-input label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--azul-marino); font-size: 14px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; padding: 16px 16px 16px 45px; font-size: 18px; font-weight: 600; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; }
        .input-wrapper input:focus { border-color: var(--azul-marino); }
        .input-wrapper .icono-moneda { position: absolute; left: 16px; font-weight: 700; font-size: 18px; }
        
        .desglose-contenedor { background: #f8fafc; border-radius: 12px; padding: 16px; margin-bottom: 24px; border: 1px dashed #cbd5e1; }
        .fila-desglose { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .fila-desglose.total { margin-bottom: 0; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 18px; font-weight: 700; color: var(--azul-marino); }
        
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: var(--verde-wa); color: var(--blanco); text-decoration: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); transition: transform 0.2s; }
        .btn-whatsapp:active { transform: scale(0.98); }
        .nota-seguridad { text-align: center; font-size: 12px; margin-top: 15px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="card-calculadora">
        <div class="header-remesa">
            <h1>Remesa Rápida <span>VENEZUELA</span></h1>
            <p><i class="fa-solid fa-bolt"></i> Envíos inmediatos vía BBVA / SEPA Instant</p>
        </div>

        <div class="cuerpo-calculadora">
            <div class="tasa-info">
                <span><i class="fa-solid fa-chart-line"></i> Tasa del día:</span>
                <span id="tasa-visual">Cargando tasa...</span>
            </div>

            <div class="grupo-input">
                <label for="monto-envio">Tú envías desde Europa:</label>
                <div class="input-wrapper">
                    <span class="icono-moneda">€</span>
                    <input type="number" id="monto-envio" value="100" min="5">
                </div>
            </div>

            <div class="desglose-contenedor">
                <div class="fila-desglose">
                    <span>Comisión fija (Flyer):</span>
                    <span>- 3,95 €</span>
                </div>
                <div class="fila-desglose">
                    <span>Monto neto a cambiar:</span>
                    <span id="neto-visual">0,00 €</span>
                </div>
                <div class="fila-desglose total">
                    <span>Tu familia recibe:</span>
                    <span id="total-recibe">0,00 VES</span>
                </div>
            </div>

            <a href="#" id="boton-enviar-wa" target="_blank" class="btn-whatsapp">
                <i class="fa-brands fa-whatsapp fa-xl"></i> Continuar envío por WhatsApp
            </a>

            <div class="nota-seguridad">
                <p><i class="fa-solid fa-shield-halved"></i> Pagos directos a nuestra cuenta BBVA.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Tus credenciales vinculadas
        const firebaseConfig = {
            apiKey: "AIzaSyBvgu33pkvBIQAO9XCWOETZRN2n6t-K5nM",
            authDomain: "remesas-venezuela.firebaseapp.com",
            databaseURL: "https://remesas-venezuela-default-rtdb.firebaseio.com",
            projectId: "remesas-venezuela",
            storageBucket: "remesas-venezuela.firebasestorage.app",
            messagingSenderId: "629650980768",
            appId: "1:629650980768:web:0023e2bd3b54b7e2b72ec5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tasaRef = ref(db, 'tasa_cambio');

        let tasaDelDia = 0;
        const comisionFija = 3.95;
        const miTelefono = "346XXNNNNNN"; // ⚠️ REEMPLAZA CON TU NÚMERO DE WHATSAPP REAL (Sin el +)

        const inputEnvio = document.getElementById('monto-envio');
        const txtTasa = document.getElementById('tasa-visual');
        const txtNeto = document.getElementById('neto-visual');
        const txtRecibe = document.getElementById('total-recibe');
        const btnWa = document.getElementById('boton-enviar-wa');

        // Escuchar cambios en Firebase EN TIEMPO REAL
        onValue(tasaRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                tasaDelDia = parseFloat(data);
                txtTasa.innerText = `${tasaDelDia.toFixed(2)} Bs. / 1€`;
                procesarCalculo();
            } else {
                txtTasa.innerText = "Error al cargar tasa";
            }
        });

        function procesarCalculo() {
            let eurosEnviados = parseFloat(inputEnvio.value);

            if (isNaN(eurosEnviados) || eurosEnviados <= comisionFija || tasaDelDia === 0) {
                txtNeto.innerText = "0,00 €";
                txtRecibe.innerText = "0,00 VES";
                btnWa.setAttribute('href', '#');
                return;
            }

            let montoNeto = eurosEnviados - comisionFija;
            let bolivaresFinales = montoNeto * tasaDelDia;

            txtNeto.innerText = `${montoNeto.toFixed(2).replace('.', ',')} €`;
            txtRecibe.innerText = `${bolivaresFinales.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} VES`;

            // Construir el mensaje para tu WhatsApp
            let textoMensaje = `Hola Remesa Rápida! 👋%0A` +
                               `Quiero realizar un envío a Venezuela.%0A%0A` +
                               `• *Tú envías:* ${eurosEnviados.toFixed(2)} EUR%0A` +
                               `• *Comisión fija:* ${comisionFija.toFixed(2)} EUR%0A` +
                               `• *Tasa aplicada:* ${tasaDelDia.toFixed(2)} Bs/1€%0A` +
                               `• *Mi familia recibe:* ${bolivaresFinales.toLocaleString('es-ES', { minimumFractionDigits: 2 })} VES%0A%0A` +
                               `¿Me indicas los datos de tu cuenta BBVA para transferir por SEPA Instant?`;

            btnWa.setAttribute('href', `https://wa.me/${+34605230629}?text=${textoMensaje}`);
        }

        inputEnvio.addEventListener('input', procesarCalculo);
    </script>
</body>
</html>
